name: Lightweight CI

on:
  push:
    branches:
      - "main"
      - "feature/**"
      - "feat/**"
  pull_request:
    branches:
      - "main"

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  dependency-review:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Dependency review
        uses: actions/dependency-review-action@v4

  gitleaks:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Secret scan
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Ruff lint
        run: ruff check .

  test:
    name: Test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - macos-latest
          - windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"

      - name: Test
        run: pytest

  evalgate:
    name: EvalGate release check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install EvalGate
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"

      - name: Validate EvalGate config
        run: evalgate --validate-config

      - name: Run and validate known-good release gate
        id: evalgate
        run: |
          mkdir -p reports
          rm -f reports/*.json
          evalgate --baseline baseline --candidate candidate-good --policy default

          report_count="$(find reports -maxdepth 1 -type f -name '*.json' | wc -l)"
          if [ "$report_count" -ne 1 ]; then
            echo "::error::Expected exactly one EvalGate report, found $report_count."
            exit 2
          fi

          report_path="$(find reports -maxdepth 1 -type f -name '*.json' -print -quit)"
          evalgate --validate-report "$report_path"
          echo "report_path=$report_path" >> "$GITHUB_OUTPUT"

      - name: Publish EvalGate summary
        run: |
          evalgate --summarize-report "${{ steps.evalgate.outputs.report_path }}" --summary-format markdown >> "$GITHUB_STEP_SUMMARY"

      - name: Upload evaluation report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: evalgate-ci-reports
          path: reports/*.json
          if-no-files-found: warn
