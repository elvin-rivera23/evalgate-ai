name: EvalGate Release Gate

on:
  workflow_dispatch:
    inputs:
      baseline:
        description: "Trusted baseline release ID"
        required: true
        default: "baseline"
      candidate:
        description: "Candidate release ID"
        required: true
        default: "candidate-good"
      policy:
        description: "Policy profile to apply"
        required: true
        default: "default"

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  evaluate:
    name: Evaluate candidate release
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install EvalGate
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"

      - name: Run EvalGate and validate report
        id: evalgate
        run: |
          mkdir -p reports
          rm -f reports/*.json

          set +e
          evalgate \
            --baseline "${{ inputs.baseline }}" \
            --candidate "${{ inputs.candidate }}" \
            --policy "${{ inputs.policy }}"
          evalgate_status=$?
          set -e

          report_count="$(find reports -maxdepth 1 -type f -name 'eval-*.json' | wc -l)"
          if [ "$report_count" -ne 1 ]; then
            echo "::error::Expected exactly one EvalGate report, found $report_count."
            exit 2
          fi

          report_path="$(find reports -maxdepth 1 -type f -name 'eval-*.json' -print -quit)"
          evalgate --validate-report "$report_path"
          echo "report_path=$report_path" >> "$GITHUB_OUTPUT"
          evalgate --summarize-report "$report_path" --summary-format markdown >> "$GITHUB_STEP_SUMMARY"

          exit "$evalgate_status"

      - name: Upload evaluation report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: evalgate-reports
          path: |
            reports/eval-*.json
            reports/index.json
          if-no-files-found: warn
