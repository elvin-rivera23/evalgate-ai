name: EvalGate Release Gate

on:
  workflow_dispatch:
    inputs:
      baseline:
        description: "Trusted baseline release ID"
        required: true
        default: "baseline"
      candidate:
        description: "Candidate release ID"
        required: true
        default: "candidate-good"
      policy:
        description: "Policy profile to apply"
        required: true
        default: "default"

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  evaluate:
    name: Evaluate candidate release
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install EvalGate
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"

      - name: Run EvalGate
        run: |
          evalgate \
            --baseline "${{ inputs.baseline }}" \
            --candidate "${{ inputs.candidate }}" \
            --policy "${{ inputs.policy }}"

      - name: Upload evaluation report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: evalgate-reports
          path: reports/*.json
          if-no-files-found: warn
